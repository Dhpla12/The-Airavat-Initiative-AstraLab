name: Build AstraLab Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build DMG
        run: scripts/packaging/package-macos.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstraLab-macOS
          path: target/installer/AstraLab-1.0.0.dmg

  windows:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wix = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" | Select-Object -First 1
          if (-not $wix) {
            throw "WiX Toolset installation was not found."
          }
          "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: pwsh
        run: scripts\packaging\package-windows.ps1

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstraLab-Windows
          path: target/installer/AstraLab-1.0.0.msi

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 wget
          sudo wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        run: scripts/packaging/package-linux.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstraLab-Linux
          path: target/installer/AstraLab-1.0.0.AppImage

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
      - linux
    steps:
      - name: Download built installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum AstraLab-1.0.0.* > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: AstraLab v0.1.0
          body: |
            AstraLab v0.1 public beta installers.

            Download the installer for your operating system:
            - macOS: AstraLab-1.0.0.dmg
            - Windows: AstraLab-1.0.0.msi
            - Linux: AstraLab-1.0.0.AppImage
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-assets/AstraLab-1.0.0.dmg
            release-assets/AstraLab-1.0.0.msi
            release-assets/AstraLab-1.0.0.AppImage
            release-assets/SHA256SUMS.txt
